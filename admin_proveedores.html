<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar Proveedores — Supabase</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f4f4; color: #2c3e50; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 20px; color: #e74c3c; border-bottom: 2px solid #f8f9fa; padding-bottom: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #27ae60; color: white; padding: 12px; border: none; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 15px; }
        button:hover { background: #219a52; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; }
        th { background-color: #2c3e50; color: white; }
        .loading { text-align: center; color: #7f8c8d; font-style: italic; padding: 10px; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <h2>🚚 Registrar Proveedor</h2>
    
    <form id="form-proveedor">
        <input type="text" id="nombre" placeholder="Nombre del Proveedor" required>
        <input type="text" id="telefono" placeholder="Teléfono">
        <input type="text" id="direccion" placeholder="Dirección">
        <button type="submit">Guardar Proveedor</button>
    </form>

    <h2>📋 Lista de Proveedores</h2>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Dirección</th>
            </tr>
        </thead>
        <tbody id="tabla-proveedores">
            <tr>
                <td colspan="3" class="loading">Cargando proveedores desde Supabase...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // 2. CONFIGURACIÓN DE TU PROYECTO SUPABASE
    // Reemplaza estos dos valores con los que te da Supabase en Settings -> API
    const SUPABASE_URL = "https://TU_PROYECTO.supabase.co";
    const SUPABASE_KEY = "TU_API_KEY_ANON_PUBLIC";
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. FUNCIÓN PARA LEER Y MOSTRAR LOS PROVEEDORES (SELECT)
    async function cargarProveedores() {
        const tbody = document.getElementById('tabla-proveedores');
        
        // Hacemos la consulta a la tabla 'proveedores' en Supabase
        const { data: proveedores, error } = await supabase
            .from('proveedores')
            .select('*')
            .order('nombre', { ascending: true });

        if (error) {
            console.error("Error cargando datos:", error.message);
            tbody.innerHTML = `<tr><td colspan="3" style="color:red;">Error al cargar datos</td></tr>`;
            return;
        }

        // Si no hay datos todavía
        if (proveedores.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#999;">No hay proveedores registrados.</td></tr>`;
            return;
        }

        // Limpiamos la tabla y metemos las filas nuevas dinámicamente
        tbody.innerHTML = "";
        proveedores.forEach(p => {
            const fila = `
                <tr>
                    <td><strong>${p.nombre}</strong></td>
                    <td>${p.telefono || '—'}</td>
                    <td>${p.direccion || '—'}</td>
                </tr>
            `;
            tbody.innerHTML += fila;
        });
    }

    // 4. FUNCIÓN PARA INSERTAR UN NUEVO PROVEEDOR (INSERT)
    document.getElementById('form-proveedor').addEventListener('submit', async (e) => {
        e.preventDefault(); // Evitamos que la página se recargue

        const nombre = document.getElementById('nombre').value;
        const telefono = document.getElementById('telefono').value;
        const direccion = document.getElementById('direccion').value;

        // Insertamos el registro en la tabla de Supabase
        const { error } = await supabase
            .from('proveedores')
            .insert([{ nombre, telefono, direccion }]);

        if (error) {
            alert("Error al guardar: " + error.message);
        } else {
            alert("¡Proveedor guardado con éxito en la nube!");
            document.getElementById('form-proveedor').reset(); // Limpiar formulario
            cargarProveedores(); // Recargar la lista automáticamente para ver los cambios
        }
    });

    // Ejecutar la carga automática de proveedores al abrir la pantalla
    cargarProveedores();
</script>

</body>
</html>
